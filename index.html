<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Farmer - Iniciar Sesión</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <section id="loginView" class="login-box card">
    <div class="panel-title">
      <div>
        <h2>Registro / Login</h2>
        <p class="muted">Crear cuenta o iniciar sesión desde una interfaz simple.</p>
      </div>
    </div>
 
    <form class="form-grid">
      <div class="form-group full">
        <label for="correo">Correo electrónico</label>
        <input id="correo" type="email" placeholder="ganadero@correo.com" />
      </div>
 
      <div class="form-group full">
        <label for="clave">Contraseña</label>
        <input id="clave" type="password" placeholder="********" />
      </div>
 
      <div class="form-group">
        <button type="button" class="btn btn-primary" id="btn-iniciar">Iniciar sesión</button>
      </div>
 
      <div class="form-group">
        <button type="button" class="btn btn-secondary">Crear cuenta</button>
      </div>
 
      <p class="helper full">Diseño pensado para una app ganadera sencilla, clara y fácil de usar en computadora o celular.</p>
    </form>
  </section>
 
  <script src="script/login.js"></script>
</body>
</html>
